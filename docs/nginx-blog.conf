# Nginx 配置 - blog.hazenix.top
# 预渲染 + SPA 双模 + HTTP/2 + Brotli 静态压缩

# 爬虫 User-Agent 检测
map $http_user_agent $crawler_redirect {
    default         0;
    ~*googlebot     1;
    ~*bingbot       1;
    ~*baiduspider   1;
    ~*yandex        1;
    ~*duckduckbot   1;
    ~*slurp         1;
    ~*twitterbot    1;
    ~*facebookexternalhit 1;
    ~*linkedinbot   1;
}

# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name blog.hazenix.top;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name blog.hazenix.top;

    ssl_certificate     /etc/nginx/ssl/blog.hazenix.top.pem;
    ssl_certificate_key /etc/nginx/ssl/blog.hazenix.top.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    root /path/to/frontend/dist;
    index index.html;

    # Brotli 静态压缩：直接返回预生成的 .br 文件，零 CPU 开销
    brotli_static on;
    # Gzip fallback
    gzip_static on;
    gzip_vary on;

    # 安全头
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ===== 核心：预渲染 + SPA 双模路由 =====
    location / {
        if ($crawler_redirect) {
            rewrite ^ /prerender$uri.html break;
        }
        try_files $uri $uri/ /index.html;
    }

    # 404 — 真正的 HTTP 404
    location = /404 {
        try_files /404.html =404;
    }

    # robots.txt
    location = /robots.txt {
        try_files /robots.txt =404;
    }

    # API 反向代理
    location /api/ {
        proxy_pass http://127.0.0.1:9090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ===== 缓存策略 =====
    # JS/CSS（带 hash）长期缓存 + immutable
    location ~* ^/assets/.*\.(js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    # 图片/字体/WebP 中期缓存
    location ~* \.(jpg|jpeg|png|gif|svg|ico|webp|woff2?|ttf)$ {
        expires 30d;
        add_header Cache-Control "public";
    }
    # 预渲染 HTML 短期缓存
    location /prerender/ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }
    # SPA index.html 不缓存
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache";
    }
}
